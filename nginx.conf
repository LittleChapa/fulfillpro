user root;
worker_processes 1;

events {
}

http {
	server {
		listen 80;
		server_name fulfillpro.ru www.fulfillpro.ru;

		location / {
			proxy_pass http://frontend:3000/;
		}

		location /api/ {
			proxy_pass http://backend:8000/;
		}
	}
	server {
    root /usr/share/nginx/html;
    index index.html index.htm index.nginx-debian.html;
    server_name fulfillpro.ru www.fulfillpro.ru; # managed by Certbot
    location / {
    	try_files $uri $uri/ =404;
    }
		listen [::]:443 ssl ipv6only=on; # managed by Certbot
		listen 443 ssl; # managed by Certbot
		ssl_certificate /etc/letsencrypt/live/fulfillpro.ru/fullchain.pem; # managed by Certbot
		ssl_certificate_key /etc/letsencrypt/live/fulfillpro.ru/privkey.pem; # managed by Certbot
		include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
		ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
	}

	server {
		if ($host = fulfillpro.ru) {
			return 301 https://$host$request_uri;
		} # managed by Certbot
		listen 80 ;
		listen [::]:80 ;
		server_name fulfillpro.ru;
		return 404; # managed by Certbot
	}
}
