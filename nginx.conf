user root;
worker_processes 1;

events {
}

http {
	server {
		listen 80;
		server_name fulfillpro.ru www.fulfillpro.ru;

		location / {
			proxy_pass http://frontend:3000/;
		}

		location /api/ {
			proxy_pass http://backend:8000/;
		}

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location / {
      return 301 https://$host$request_uri;
    }
	}
	server {
		listen 443 ssl;
		server_name fulfillpro.ru www.fulfillpro.ru;

		ssl_certificate /etc/nginx/ssl/live/fulfillpro.ru/fullchain.pem;
		ssl_certificate_key /etc/nginx/ssl/live/fulfillpro.ru/privkey.pem;
		include /etc/nginx/ssl/options-ssl-nginx.conf;
		ssl_dhparam /etc/nginx/ssl/ssl-dhparams.pem;

		location / {
				proxy_pass http://frontend:3000/;
		}

		location /api/ {
				proxy_pass http://backend:8000/;
		}
	}
}
