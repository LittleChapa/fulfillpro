version: '3'

services:
  frontend:
    build: ./client
    ports:
      - 80:80
    restart: always
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt # Храните сертификаты
      - ./data/certbot/www:/var/www/certbot # Для верификации

  backend:
    build: ./server
    ports:
      - 3000:3000
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
