networks:
  dev:

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - '443:443'
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
    depends_on:
      - backend
      - frontend
    networks:
      - dev

  backend:
    build: ./server
    restart: always
    networks:
      - dev

  frontend:
    build: ./client
    restart: always
    networks:
      - dev
