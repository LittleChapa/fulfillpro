networks:
  dev:

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
      - '/etc/letsencrypt/live/fulfillpro.ru:/etc/letsencrypt/live/fulfillpro.ru' # Монтирование сертификатов
      - '/etc/letsencrypt/options-ssl-nginx.conf:/etc/letsencrypt/options-ssl-nginx.conf' # Опционально
      - '/etc/letsencrypt/ssl-dhparams.pem:/etc/letsencrypt/ssl-dhparams.pem' # Опционально
    depends_on:
      - backend
      - frontend
    networks:
      - dev

  backend:
    build: ./server
    restart: always
    networks:
      - dev

  frontend:
    build: ./client
    restart: always
    networks:
      - dev
