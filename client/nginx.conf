worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name fulfillpro.ru www.fulfillpro.ru;

        # Редирект с HTTP на HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;  # Добавляем SSL
        server_name fulfillpro.ru www.fulfillpro.ru;

        ssl_certificate /etc/nginx/certs/fullchain.pem;  # Путь к сертификату
        ssl_certificate_key /etc/nginx/certs/privkey.pem;  # Путь к приватному ключу

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ / =404;
        }

        location /api/ {
            proxy_pass http://backend:3000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
