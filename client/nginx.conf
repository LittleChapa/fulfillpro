worker_processes auto;

events {
    worker_connections 1024;  # Максимальное количество соединений на процесс
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Основной сервер
    server {
        listen 80;
        server_name fulfillpro.ru www.fulfillpro.ru;

				location /.well-known/acme-challenge/ {
					root /var/www/certbot;  # Убедитесь, что путь правильный
				}

        # Редирект с HTTP на HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name fulfillpro.ru www.fulfillpro.ru;

        ssl_certificate /etc/letsencrypt/live/fulfillpro.ru/fullchain.pem;  # Путь к вашему сертификату
        ssl_certificate_key /etc/letsencrypt/live/fulfillpro.ru/privkey.pem;  # Путь к вашему приватному ключу

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ / =404;
        }

        location /api/ {
            proxy_pass http://backend:3000;  # Используйте имя сервиса в Docker Compose
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
